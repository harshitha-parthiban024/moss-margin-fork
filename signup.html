<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up | Moss and Margins</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
<div class="container nav-container">
<div class="nav-logo"><a href="index.html">🦋 Moss & Margins</a></div>
</div>
</nav>

<div class="form-container">

<h2>Create Account</h2>

<form onsubmit="return validateForm()">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone" placeholder="Enter a 10-digit number">
</div>

<div class="form-group">
<label>Gender</label>

<div class="gender-group">
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Male"> Male</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>

</div>

<div class="form-group">
<label>Age</label>
<input type="number" id="age" placeholder="Enter your age">
</div>

<div class="form-group">
<label>Age Group</label>
<select id="ageGroup">
<option value="">--Select--</option>
<option value="below18">Under 18</option>
<option value="18-25">18–25</option>
<option value="26-40">26–40</option>
<option value="40+">40+</option>
</select>
</div>

<div class="form-group">
<label>Username</label>
<input type="text" id="username" placeholder="Choose a username">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="Create a password">
</div>

<div class="form-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Confirm your password">
</div>

<div class="form-group">
<input type="checkbox" id="terms"> I agree to <a href="terms.html">terms & conditions</a>
</div>

<p id="errorMsg" class="error"></p>

<button class="form-submit" type="submit">Create Account</button>

</form>

</div>

<script src="signup.js"></script>

</body>
</html>
