<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Moss and Margins</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
<div class="container nav-container">
<div class="nav-logo"><a href="index.html">🦋 Moss & Margins</a></div>
<ul class="nav-menu">

</ul>
</div>
</nav>

<div class="form-container">
<h2>Welcome Back</h2>
<form id="loginForm">
<div class="form-group">
<label>Email</label>
<input type="email" required>
</div>
<div class="form-group">
<label>Password</label>
<input type="password" required>
</div>
<button type="submit" class="form-submit">Login</button>
<p style="margin-top:15px; text-align:center;">No account? <a href="signup.html">Sign up</a></p>
</form>
</div>
<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

let email = document.querySelector("input[type='email']").value;
let password = document.querySelector("input[type='password']").value;

/* Email format check */
let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(email === "" || password === ""){
alert("Please fill in all fields 📚");
return;
}

if(!email.match(emailPattern)){
alert("Please enter a valid email address 📧");
return;
}

/* If validation passes */
alert("Login successful! Welcome back 🌿");

window.location.href = "bestseller.html";

});

</script>

</body>
</html>
