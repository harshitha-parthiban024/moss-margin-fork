<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout | Moss & Margins</title>
<link rel="stylesheet" href="style.css">

<style>

.checkout-wrapper{
max-width:1000px;
margin:80px auto;
display:flex;
gap:40px;
}

/* CART ITEMS */

.cart-items{
flex:2;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.cart-item{
display:flex;
align-items:center;
gap:20px;
padding:15px 0;
border-bottom:1px solid #ddd;
}

.cart-item img{
width:70px;
height:100px;
object-fit:cover;
border-radius:5px;
}

.book-info{
flex:1;
}

.book-title{
font-weight:bold;
color:#2f5d50;
}

.quantity{
width:60px;
padding:5px;
}

/* ORDER SUMMARY */

.order-summary{
flex:1;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
height:fit-content;
}

.order-summary h3{
margin-bottom:20px;
color:#2f5d50;
}

.summary-row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
font-weight:bold;
font-size:18px;
margin-top:15px;
}

.place-order{
width:100%;
margin-top:20px;
padding:12px;
background:#2f5d50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.place-order:hover{
background:#24483e;
}

</style>
</head>

<body>

<nav class="navbar">
<div class="container nav-container">
<div class="nav-logo"><a href="index.html">🦋 Moss & Margins</a></div>
<ul class="nav-menu">
<li><a href="index.html">Home</a></li>
<li><a href="bestseller.html">Bestsellers</a></li>
<li><a href="tracking.html">Tracking</a></li>
<li><a href="recommendation.html">Recommendation</a></li>
<li><a href="cart.html">🛒 Checkout</a></li>
<li><a href="groups.html">Group Chat</a></li>
<li><a href="wrapped.html">Wrapped</a></li>
<li><a href="game.html">🎮 Fun Game!</a></li>
<li><a href="quiz.html">🧠 Book Quiz</a></li>
</ul>
</div>
</nav>

<div class="checkout-wrapper">

<!-- CART ITEMS -->

<div class="cart-items">

<h2>Your Cart</h2>

<div class="cart-item">

<img src="ovs.png">

<div class="book-info">
<div class="book-title">The Overstory</div>
<div>₹450</div>
</div>

<input type="number" value="1" min="1" class="quantity">

</div>

<div class="cart-item">

<img src="ttt.png">

<div class="book-info">
<div class="book-title">Tomorrow and Tomorrow and Tomorrow</div>
<div>₹520</div>
</div>

<input type="number" value="1" min="1" class="quantity">

</div>

</div>

<!-- ORDER SUMMARY -->

<div class="order-summary">

<h3>Order Summary</h3>

<div class="summary-row">
<span>Items</span>
<span>2</span>
</div>

<div class="summary-row">
<span>Subtotal</span>
<span>₹970</span>
</div>

<div class="summary-row">
<span>Shipping</span>
<span>₹40</span>
</div>

<div class="summary-row total">
<span>Total</span>
<span>₹1010</span>
</div>

<button class="place-order" onclick="placeOrder()">
Place Order
</button>

</div>

</div>

<script>

function placeOrder(){

alert("Order placed successfully! 📚");

window.location.href="feedback.html";

}

const toggle = document.getElementById("modeToggle");

/* Load saved theme */

if(localStorage.getItem("theme") === "dark"){
document.body.classList.add("dark-mode");
toggle.textContent = "☀️";
}

/* Toggle theme */

toggle.addEventListener("click", function(){

document.body.classList.toggle("dark-mode");

if(document.body.classList.contains("dark-mode")){
localStorage.setItem("theme","dark");
toggle.textContent = "☀️";
}else{
localStorage.setItem("theme","light");
toggle.textContent = "🌙";
}

});

</script>

</body>
</html>
