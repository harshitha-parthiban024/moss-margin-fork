<section>
  <h2 align="center">Write a Review</h2>

  <form class="card">
    <label>Book Title</label>
    <input type="text">

    <label>Theme</label>
    <input type="text">

    <label>Recommended Age</label>
    <select>
      <option>12+</option>
      <option>16+</option>
      <option>18+</option>
    </select>

    <label>Rating</label>
    ⭐ ⭐ ⭐ ⭐ ⭐

    <label>Review</label>
    <textarea rows="4"></textarea>

    <label>Favorite Quote</label>
    <textarea rows="2"></textarea>

    <br>
    <button class="btn">Submit Review</button>
  </form>
</section>
